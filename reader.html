<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Read Online — PE Notes</title>
<link rel="stylesheet" href="style.css">
<style>
  .reader-wrap{ padding: 32px 0; }
  .reader-frame{
    width: 100%;
    height: 78vh;
    border: 1px solid var(--chalk-line);
    border-radius: 4px;
    background: var(--white);
  }
  .reader-note{
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="whistle-dot"></span> ALOK&nbsp;SIR</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="class-11.html">Class 11</a></li>
      <li><a href="class-12.html">Class 12</a></li>
      <li><a href="buy-book.html">Buy the Book</a></li>
    </ul>
  </div>
</header>
<div class="lanes dark"></div>

<section class="block reader-wrap">
  <div class="wrap">
    <div class="section-head" style="margin-bottom:18px;">
      <div class="eyebrow">Reading mode</div>
      <h2 id="chapter-title">Chapter</h2>
    </div>

    <iframe id="drive-frame" class="reader-frame" allow="autoplay" title="Chapter notes"></iframe>
    <p class="reader-note">Viewing only — download and printing are disabled for this chapter.</p>
  </div>
</section>

<footer class="site">
  <div class="wrap">
    <div>© <span id="year"></span> Alok Choudhary. Made for students.</div>
    <div><a href="index.html">Home</a></div>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  // Read ?id= and ?title= from the URL, e.g.
  // reader.html?id=1AbCdEfGhIjKlMnOp&title=Chapter%2001%20%E2%80%94%20Changing%20Trends
  const params = new URLSearchParams(window.location.search);
  const fileId = params.get('id');
  const title = params.get('title') || 'Chapter notes';

  document.getElementById('chapter-title').textContent = title;
  document.getElementById('page-title').textContent = title + ' — PE Notes';

  const frame = document.getElementById('drive-frame');
  if (fileId) {
    frame.src = 'https://drive.google.com/file/d/' + fileId + '/preview';
  } else {
    frame.outerHTML = '<p style="color:var(--muted)">No file linked yet — add a Drive file ID to this chapter\'s link.</p>';
  }
</script>
</body>
</html>
